 <script>
  const grid = document.querySelector(".archive-grid");
  if (!grid) throw new Error("Missing .archive-grid");

  function resizeGridItem(item){
    const styles = window.getComputedStyle(grid);
    const rowHeight = parseInt(styles.getPropertyValue("grid-auto-rows"), 10);
    const gap = parseInt(styles.getPropertyValue("gap"), 10);

    // luam inaltimea reala a continutului
    const content = item.querySelector(".archive-media");
    if (!content) return;

    const contentHeight = content.getBoundingClientRect().height;
    const rowSpan = Math.ceil((contentHeight + gap) / (rowHeight + gap));

    item.style.gridRowEnd = `span ${rowSpan}`;
  }

  function resizeAll(){
    const items = grid.querySelectorAll(".archive-card");
    items.forEach(resizeGridItem);
  }

  // Reflow dupa ce se incarca imaginile
  function watchMedia(){
    grid.querySelectorAll("img").forEach(img => {
      if (img.complete) return;
      img.addEventListener("load", resizeAll, { once: true });
    });

    grid.querySelectorAll("video").forEach(video => {
      // cand are dimensiuni disponibile
      video.addEventListener("loadedmetadata", resizeAll, { once: true });
      video.addEventListener("loadeddata", resizeAll, { once: true });
    });
  }

  // Video play only on hover
  function enableVideoHover(){
    document.querySelectorAll(".archive-card video").forEach(video => {
      const card = video.closest(".archive-card");
      if (!card) return;

      card.addEventListener("mouseenter", () => video.play());
      card.addEventListener("mouseleave", () => {
        video.pause();
        video.currentTime = 0;
      });
    });
  }

  // Initial
  window.addEventListener("load", () => {
    watchMedia();
    resizeAll();
    enableVideoHover();
  });

  // On resize (debounced)
  let t;
  window.addEventListener("resize", () => {
    clearTimeout(t);
    t = setTimeout(resizeAll, 120);
  });



    document.addEventListener("DOMContentLoaded", () => {

});
</script>
